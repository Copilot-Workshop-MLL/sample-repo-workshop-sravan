<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Management System</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }

      /* Particle float animation */
      @keyframes ems-float {
        0%   { transform: translateY(0)    scale(1);   opacity: 0.5; }
        50%  { transform: translateY(-22px) scale(1.1); opacity: 0.8; }
        100% { transform: translateY(0)    scale(1);   opacity: 0.5; }
      }

      /* Ripple expand-and-fade animation */
      @keyframes ems-ripple {
        0%   { transform: scale(0.6); opacity: 0.7; }
        100% { transform: scale(2.4); opacity: 0; }
      }

      /* Subtle fade-in for cards/panels */
      @keyframes ems-fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .ems-particle { animation: ems-float linear infinite; }
      .ems-ripple   { animation: ems-ripple ease-out forwards; }
      .ems-fadeIn   { animation: ems-fadeIn 0.35s ease both; }

      /* Respect user's reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        .ems-particle,
        .ems-ripple,
        .ems-fadeIn,
        .ems-progress-arc {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-_umpYBv6.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
